<!DOCTYPE html>
<html>
<head>
  <title>Register - Vision OCR</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(0,255,200,0.2);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      filter: blur(100px);
    }

    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,100,200,0.2);
      border-radius: 50%;
      bottom: -100px;
      right: -100px;
      filter: blur(100px);
    }

    .card-box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 20px;
      width: 360px;
      text-align: center;
      color: white;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .card-box img {
      width: 70px;
      margin-bottom: 10px;
    }

    .form-control {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
    }

    .form-control::placeholder {
      color: #ddd;
    }

    .form-control:focus {
      box-shadow: none;
      background: rgba(255,255,255,0.3);
    }

    .btn-custom {
      background: linear-gradient(90deg, #00f260, #0575e6);
      border: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-custom:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00f260;
    }

    .password-box {
      position: relative;
    }

    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 10px;
      cursor: pointer;
      color: #ccc;
      font-size: 13px;
    }

    a {
      color: #00f260;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="card-box">

  <img src="{{ url_for('static', filename='logo.png') }}">

  <h3>Create Account</h3>

  <form method="POST">

    <input name="username" type="email" class="form-control mb-3" placeholder="Email" required>

    <div class="password-box mb-3">
      <input id="password" name="password" type="password" class="form-control" placeholder="Password" required>
      <span class="toggle-btn" onclick="togglePassword()">Show</span>
    </div>

    <button class="btn btn-custom w-100">Register</button>

  </form>

  <p class="mt-3">
    <a href="/">Back to login</a>
  </p>

</div>

<script>
function togglePassword() {
  var pwd = document.getElementById("password");
  pwd.type = (pwd.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
